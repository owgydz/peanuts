name: Build Peanuts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller peanuts.py --name peanuts --onefile --add-data "stdlib:stdlib"

      - name: Rename Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/peanuts dist/peanuts-${{ github.ref_name }}-linux
      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller peanuts.py --name peanuts --onefile --add-data "stdlib;stdlib"

      - name: Rename Windows binary
        if: matrix.os == 'windows-latest'
        run: rename dist\peanuts.exe peanuts-${{ github.ref_name }}-windows.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peanuts-${{ matrix.os }}
          path: dist/*
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}